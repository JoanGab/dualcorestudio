<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DualCore Studio — Ingeniería Sin Límites</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1e;
    --card: #161f38;
    --card2: #0f172a;
    --neon: #00e5b0;
    --neon2: #00c4f4;
    --neon-dim: rgba(0,229,176,0.12);
    --neon2-dim: rgba(0,196,244,0.10);
    --text: #e2e8f0;
    --muted: #7a8aaa;
    --border: rgba(0,229,176,0.15);
    --border2: rgba(0,196,244,0.12);
    --font-title: 'Sora', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-title);
    overflow-x: hidden;
    cursor: default;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,176,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* Glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    opacity: 0.25;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 6vw;
    background: rgba(10,15,30,0.75);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .nav-logo-img-wrap {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Logo upload target */
  .logo-upload-label {
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
  }

  .logo-upload-label img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    display: block;
  }

  .logo-placeholder {
    width: 44px;
    height: 44px;
    border: 1.5px dashed var(--neon);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--neon);
    font-size: 10px;
    font-family: var(--font-mono);
    text-align: center;
    line-height: 1.2;
    cursor: pointer;
    transition: background 0.2s;
    padding: 4px;
  }

  .logo-placeholder:hover { background: var(--neon-dim); }

  .nav-brand {
    font-family: var(--font-title);
    font-weight: 700;
    font-size: 1.1rem;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .nav-brand span { color: var(--neon); }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--neon); }

  .nav-cta {
    background: var(--neon);
    color: #0a0f1e !important;
    padding: 8px 20px;
    border-radius: 6px;
    font-weight: 600 !important;
    font-family: var(--font-title) !important;
    font-size: 0.82rem !important;
    transition: all 0.2s !important;
    letter-spacing: 0 !important;
  }

  .nav-cta:hover {
    background: #00ffc8 !important;
    box-shadow: 0 0 24px rgba(0,229,176,0.5) !important;
    color: #0a0f1e !important;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 6vw 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--neon-dim);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 18px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--neon);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
    animation: fadeSlideDown 0.8s ease both;
  }

  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .hero h1 {
    font-family: var(--font-title);
    font-size: clamp(2.4rem, 6vw, 5rem);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -2px;
    color: #fff;
    max-width: 900px;
    animation: fadeSlideDown 0.9s ease 0.1s both;
  }

  .hero h1 .neon { color: var(--neon); }
  .hero h1 .blue { color: var(--neon2); }

  .hero-sub {
    margin-top: 24px;
    color: var(--muted);
    font-size: clamp(1rem, 2vw, 1.15rem);
    max-width: 600px;
    line-height: 1.7;
    animation: fadeSlideDown 1s ease 0.2s both;
  }

  .hero-actions {
    display: flex;
    gap: 16px;
    margin-top: 40px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeSlideDown 1.1s ease 0.3s both;
  }

  .btn-primary {
    background: var(--neon);
    color: #0a0f1e;
    padding: 14px 32px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.9rem;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-title);
  }

  .btn-primary:hover {
    background: #00ffc8;
    box-shadow: 0 0 40px rgba(0,229,176,0.5), 0 8px 32px rgba(0,0,0,0.3);
    transform: translateY(-2px);
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    padding: 14px 32px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none;
    border: 1px solid var(--border2);
    cursor: pointer;
    transition: all 0.25s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-title);
  }

  .btn-secondary:hover {
    border-color: var(--neon2);
    color: var(--neon2);
    box-shadow: 0 0 24px rgba(0,196,244,0.15);
    transform: translateY(-2px);
  }

  .hero-stack {
    margin-top: 64px;
    animation: fadeSlideDown 1.2s ease 0.4s both;
  }

  .stack-label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .stack-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .stack-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--neon);
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .stack-pill:hover {
    background: var(--neon-dim);
    border-color: var(--neon);
    box-shadow: 0 0 16px rgba(0,229,176,0.2);
    transform: translateY(-2px);
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SECTIONS COMMON */
  section {
    padding: 100px 6vw;
    position: relative;
  }

  .section-label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--neon);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    display: block;
    height: 1px;
    width: 40px;
    background: var(--neon);
    opacity: 0.5;
  }

  .section-title {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 16px;
  }

  .section-desc {
    color: var(--muted);
    font-size: 1.05rem;
    line-height: 1.7;
    max-width: 560px;
  }

  /* SERVICES */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 56px;
  }

  .service-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon), var(--neon2));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .service-card:hover { 
    transform: translateY(-6px);
    border-color: rgba(0,229,176,0.3);
    box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 40px rgba(0,229,176,0.08);
  }

  .service-card:hover::before { opacity: 1; }

  .service-icon {
    width: 52px; height: 52px;
    background: var(--neon-dim);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 20px;
  }

  .service-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 10px;
  }

  .service-desc {
    color: var(--muted);
    font-size: 0.88rem;
    line-height: 1.7;
  }

  .service-tag {
    margin-top: 20px;
    display: inline-block;
    background: var(--neon-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--neon);
    letter-spacing: 0.5px;
  }

  /* LOANPRO */
  .loanpro-section {
    background: linear-gradient(135deg, rgba(22,31,56,0.6) 0%, rgba(10,15,30,0.95) 100%);
  }

  .loanpro-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }

  .loanpro-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,196,244,0.1);
    border: 1px solid rgba(0,196,244,0.25);
    border-radius: 100px;
    padding: 5px 14px;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--neon2);
    letter-spacing: 1px;
    margin-bottom: 18px;
  }

  .loanpro-title {
    font-size: clamp(2rem, 3.5vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -1.5px;
    color: #fff;
    margin-bottom: 18px;
  }

  .loanpro-title span { color: var(--neon2); }

  .loanpro-desc {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.8;
    margin-bottom: 32px;
  }

  .loanpro-features {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .feature-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 0.88rem;
    color: var(--text);
  }

  .feature-row .dot {
    width: 7px; height: 7px;
    background: var(--neon);
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--neon);
  }

  .loanpro-card {
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .loanpro-card::after {
    content: '';
    position: absolute;
    bottom: -60px; right: -60px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: var(--neon2);
    opacity: 0.06;
    filter: blur(40px);
  }

  .lp-stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .lp-stat {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
  }

  .lp-stat-val {
    font-family: var(--font-mono);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--neon2);
    display: block;
  }

  .lp-stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--font-mono);
  }

  .lp-tech-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .lp-tech {
    background: var(--neon2-dim);
    border: 1px solid rgba(0,196,244,0.2);
    border-radius: 5px;
    padding: 4px 12px;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--neon2);
  }

  /* TEAM */
  .team-section { background: var(--bg); }

  .team-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 48px;
    max-width: 760px;
  }

  .team-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    transition: all 0.3s;
  }

  .team-card:hover {
    transform: translateY(-4px);
    border-color: rgba(0,229,176,0.35);
    box-shadow: 0 16px 48px rgba(0,0,0,0.3), 0 0 32px rgba(0,229,176,0.06);
  }

  .team-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.2rem;
    color: #0a0f1e;
    margin-bottom: 16px;
  }

  .team-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .team-role {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--neon);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .team-bio {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.7;
  }

  /* CONTACT */
  .contact-section {
    background: linear-gradient(180deg, var(--bg) 0%, rgba(22,31,56,0.4) 100%);
  }

  .contact-inner {
    max-width: 700px;
    margin: 0 auto;
    text-align: center;
  }

  .contact-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 48px;
  }

  .contact-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px;
    text-decoration: none;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }

  .contact-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }

  .contact-card.instagram:hover {
    border-color: #e1306c;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 32px rgba(225,48,108,0.15);
  }

  .contact-card.whatsapp:hover {
    border-color: #25d366;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 32px rgba(37,211,102,0.15);
  }

  .contact-card.email:hover {
    border-color: var(--neon2);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 32px rgba(0,196,244,0.15);
  }

  .contact-card.website:hover {
    border-color: var(--neon);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 32px rgba(0,229,176,0.15);
  }

  .contact-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
  }

  .contact-icon.ig { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
  .contact-icon.wa { background: #25d366; }
  .contact-icon.em { background: rgba(0,196,244,0.15); border: 1px solid rgba(0,196,244,0.3); }
  .contact-icon.wb { background: var(--neon-dim); border: 1px solid var(--border); }

  .contact-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .contact-value {
    font-size: 0.88rem;
    color: #fff;
    font-weight: 600;
    text-align: center;
  }

  .contact-card.instagram .contact-value { color: #f96ba0; }
  .contact-card.whatsapp .contact-value { color: #4ade80; }
  .contact-card.email .contact-value { color: var(--neon2); font-size: 0.8rem; }
  .contact-card.website .contact-value { color: var(--neon); font-size: 0.78rem; word-break: break-all; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 6vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .footer-left {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--muted);
  }

  .footer-left span { color: var(--neon); }

  .footer-right {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* MOBILE NAV */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    background: none;
    border: none;
  }

  .hamburger span {
    display: block;
    width: 22px; height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.3s;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 73px; left: 0; right: 0;
    background: rgba(10,15,30,0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 20px 6vw;
    z-index: 99;
    flex-direction: column;
    gap: 20px;
  }

  .mobile-menu.open { display: flex; }

  .mobile-menu a {
    color: var(--text);
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    transition: color 0.2s;
  }

  .mobile-menu a:hover { color: var(--neon); }

  /* DIVIDER */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .loanpro-inner { grid-template-columns: 1fr; gap: 40px; }
    .team-grid { grid-template-columns: 1fr; max-width: 400px; }
    .contact-cards { grid-template-columns: 1fr; }
  }

  @media (max-width: 700px) {
    .nav-links { display: none; }
    .hamburger { display: flex; }
    .contact-cards { grid-template-columns: 1fr 1fr; }
    footer { flex-direction: column; text-align: center; }
  }

  @media (max-width: 480px) {
    .contact-cards { grid-template-columns: 1fr; }
    .hero-actions { flex-direction: column; align-items: center; }
    .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
    .lp-stat-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Animations on scroll */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
</style>

/* ---- Reveal hook ---- */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}
