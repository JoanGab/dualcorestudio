<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DualCore Studio — Ingeniería Sin Límites</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --bg2:#f8fafc;
  --bg3:#f1f5f9;
  --green:#00e5b0;
  --blue:#0095ff;
  --grad:linear-gradient(135deg,#0095ff 0%,#00e5b0 100%);
  --grad-text:linear-gradient(135deg,#0095ff,#00e5b0);
  --text:#1a1a1a;
  --sub:#666666;
  --border:#e8edf3;
  --border2:#d1dce9;
  --shadow:0 2px 16px rgba(0,0,0,.06);
  --shadow-md:0 8px 40px rgba(0,0,0,.09);
  --shadow-lg:0 20px 60px rgba(0,0,0,.11);
  --shadow-blue:0 8px 32px rgba(0,149,255,.18);
  --shadow-green:0 8px 32px rgba(0,229,176,.18);
  --font:'Sora',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:16px;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;-webkit-font-smoothing:antialiased}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:4px}

/* ── NOISE TEXTURE OVERLAY ── */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4
}
#root{position:relative;z-index:1}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5vw;height:68px;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{display:flex;align-items:center;gap:11px;text-decoration:none;cursor:pointer}
.nav-brand{font-weight:800;font-size:1.05rem;color:var(--text);letter-spacing:-.6px}
.nav-brand span{background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{color:var(--sub);text-decoration:none;font-size:.82rem;font-weight:500;letter-spacing:-.2px;transition:color .2s}
.nav-links a:hover{color:var(--text)}
.nav-cta{
  background:var(--grad);color:#fff!important;
  padding:9px 22px;border-radius:9px;font-weight:700!important;
  font-family:var(--font)!important;font-size:.82rem!important;
  transition:all .25s!important;letter-spacing:-.2px!important;
  box-shadow:var(--shadow-blue)
}
.nav-cta:hover{box-shadow:0 12px 40px rgba(0,149,255,.35)!important;transform:translateY(-1px)!important;filter:brightness(1.06)!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:6px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.mobile-menu{
  display:none;position:fixed;top:68px;left:0;right:0;
  background:rgba(255,255,255,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:20px 5vw;z-index:99;flex-direction:column;gap:4px
}
.mobile-menu.open{display:flex}
.mobile-menu a{
  color:var(--text);text-decoration:none;font-size:.9rem;font-weight:500;
  padding:11px 0;border-bottom:1px solid var(--border);transition:color .2s
}
.mobile-menu a:hover{color:var(--blue)}

/* ── HERO ── */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:120px 5vw 80px;
  position:relative;overflow:hidden;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,149,255,.06) 0%,transparent 70%),
             radial-gradient(ellipse 60% 50% at 100% 80%,rgba(0,229,176,.05) 0%,transparent 70%),
             #fff;
}
.hero-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:#fff;border:1px solid var(--border);border-radius:100px;
  padding:7px 18px;font-family:var(--mono);font-size:.68rem;
  color:var(--sub);letter-spacing:1px;text-transform:uppercase;
  box-shadow:var(--shadow);margin-bottom:32px;
  animation:fsd .7s ease both
}
.hero-pill .live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);box-shadow:0 0 0 3px rgba(0,229,176,.2);
  animation:pulse 2.4s ease infinite
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(0,229,176,.2)}50%{box-shadow:0 0 0 6px rgba(0,229,176,.08)}}
.hero h1{
  font-size:clamp(2.8rem,7vw,5.6rem);font-weight:900;
  line-height:1.02;letter-spacing:-3.5px;color:var(--text);
  max-width:920px;animation:fsd .8s ease .08s both
}
.hero h1 .g{background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{
  margin-top:24px;color:var(--sub);
  font-size:clamp(1rem,1.8vw,1.12rem);max-width:540px;
  line-height:1.8;animation:fsd .9s ease .16s both;font-weight:400
}
.hero-actions{display:flex;gap:12px;margin-top:36px;flex-wrap:wrap;justify-content:center;animation:fsd 1s ease .24s both}
.btn-grad{
  background:var(--grad);color:#fff;
  padding:14px 30px;border-radius:10px;font-weight:700;font-size:.88rem;
  border:none;cursor:pointer;transition:all .25s;
  display:inline-flex;align-items:center;gap:8px;font-family:var(--font);
  letter-spacing:-.2px;box-shadow:var(--shadow-blue)
}
.btn-grad:hover{box-shadow:0 12px 40px rgba(0,149,255,.35);transform:translateY(-2px);filter:brightness(1.05)}
.btn-outline{
  background:#fff;color:var(--text);
  padding:14px 30px;border-radius:10px;font-weight:600;font-size:.88rem;
  border:1.5px solid var(--border2);cursor:pointer;transition:all .25s;
  display:inline-flex;align-items:center;gap:8px;font-family:var(--font);
  letter-spacing:-.2px;text-decoration:none
}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);box-shadow:var(--shadow-blue);transform:translateY(-2px)}

/* LOGO HERO */
.hero-logo-wrap{
  margin:44px auto 0;animation:fsd 1.1s ease .32s both;
  display:flex;align-items:center;justify-content:center;
  width:140px;height:140px;position:relative
}
.hero-logo-ring{
  position:absolute;inset:-12px;border-radius:50%;
  background:conic-gradient(from 0deg,#0095ff,#00e5b0,#0095ff);
  opacity:.12;animation:spin 8s linear infinite
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.hero-logo-inner{
  width:140px;height:140px;border-radius:50%;background:#fff;
  border:1.5px solid var(--border);box-shadow:var(--shadow-md);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;overflow:hidden;cursor:pointer
}
.hero-logo-inner img{width:100%;height:100%;object-fit:contain;display:block}
.hero-logo-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-family:var(--mono);font-size:.6rem;color:var(--sub);text-align:center
}

/* STACK */
.hero-stack{margin-top:48px;animation:fsd 1.2s ease .4s both}
.stack-lbl{font-family:var(--mono);font-size:.62rem;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.stack-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.stack-pill{
  background:#fff;border:1px solid var(--border);border-radius:7px;
  padding:5px 13px;font-family:var(--mono);font-size:.68rem;color:var(--sub);
  letter-spacing:.4px;transition:all .2s;box-shadow:var(--shadow);font-weight:500
}
.stack-pill:hover{border-color:var(--blue);color:var(--blue);box-shadow:var(--shadow-blue);transform:translateY(-2px)}

@keyframes fsd{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTIONS ── */
section{padding:100px 5vw;position:relative}
.sec-eye{
  font-family:var(--mono);font-size:.62rem;color:var(--blue);
  letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;font-weight:500
}
.sec-eye::before{content:'';width:20px;height:1.5px;background:var(--blue)}
.sec-title{
  font-size:clamp(1.9rem,3.5vw,2.8rem);font-weight:800;
  letter-spacing:-2px;line-height:1.08;color:var(--text);margin-bottom:12px
}
.sec-title .g{background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sec-desc{color:var(--sub);font-size:.95rem;line-height:1.8;max-width:500px;font-weight:400}

/* DIVIDER */
.divider{width:100%;height:1px;background:var(--border)}

/* BG ALT */
.bg-alt{background:var(--bg2)}
.bg-alt2{background:var(--bg3)}

/* ── SERVICES ── */
.svc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:52px}
.svc-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r);
  padding:28px;transition:all .3s;position:relative;overflow:hidden;
  box-shadow:var(--shadow)
}
.svc-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--grad);opacity:0;transition:opacity .3s
}
.svc-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:rgba(0,149,255,.15)}
.svc-card:hover::after{opacity:1}
.svc-icon-box{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;margin-bottom:18px
}
.svc-name{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:7px;letter-spacing:-.3px}
.svc-txt{color:var(--sub);font-size:.82rem;line-height:1.7}
.svc-tag{
  margin-top:16px;display:inline-block;
  background:var(--bg2);border:1px solid var(--border);border-radius:5px;
  padding:3px 10px;font-family:var(--mono);font-size:.6rem;color:var(--sub)
}

/* ── PROJECTS ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;margin-top:52px}
.proj-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;transition:all .3s;position:relative;box-shadow:var(--shadow)
}
.proj-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:rgba(0,149,255,.2)}
.proj-thumb{
  width:100%;height:160px;
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;position:relative;overflow:hidden
}
.proj-body{padding:22px}
.proj-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(0,229,176,.08);border:1px solid rgba(0,229,176,.2);
  border-radius:100px;padding:3px 11px;
  font-family:var(--mono);font-size:.6rem;color:#00b890;margin-bottom:10px;font-weight:500
}
.proj-name{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.4px}
.proj-desc{color:var(--sub);font-size:.82rem;line-height:1.7;margin-bottom:14px}
.proj-tech{display:flex;flex-wrap:wrap;gap:6px}
.t-pill{
  background:rgba(0,149,255,.06);border:1px solid rgba(0,149,255,.15);
  border-radius:5px;padding:3px 9px;
  font-family:var(--mono);font-size:.6rem;color:var(--blue);font-weight:500
}
.edit-btn{
  position:absolute;top:10px;right:10px;
  background:rgba(0,149,255,.9);color:#fff;backdrop-filter:blur(8px);
  border:none;border-radius:7px;padding:5px 12px;
  font-family:var(--mono);font-size:.62rem;cursor:pointer;
  display:flex;align-items:center;gap:4px;transition:all .2s;box-shadow:var(--shadow-blue)
}
.edit-btn:hover{background:var(--blue);box-shadow:0 4px 20px rgba(0,149,255,.45)}

/* ── LOANPRO ── */
.lp-wrap{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
.lp-feat{display:flex;flex-direction:column;gap:9px;margin-bottom:28px}
.lp-row{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:var(--sub)}
.lp-dot{width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:7px;flex-shrink:0}
.lp-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r);
  padding:28px;box-shadow:var(--shadow-md)
}
.lp-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.lp-stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.lp-val{font-family:var(--mono);font-size:1.3rem;font-weight:700;background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block}
.lp-lbl{font-size:.66rem;color:var(--sub);margin-top:3px;font-family:var(--mono)}
.lp-techs{display:flex;flex-wrap:wrap;gap:7px}
.lp-tech{
  background:rgba(0,229,176,.07);border:1px solid rgba(0,229,176,.18);
  border-radius:5px;padding:4px 10px;font-family:var(--mono);
  font-size:.62rem;color:#00b890;font-weight:500
}

/* ── TEAM ── */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:48px;max-width:680px}
.team-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:28px;transition:all .3s;box-shadow:var(--shadow)}
.team-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:rgba(0,149,255,.2)}
.team-av{
  width:52px;height:52px;border-radius:50%;
  background:var(--grad);display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:1.05rem;color:#fff;margin-bottom:14px;
  box-shadow:var(--shadow-blue)
}
.team-name{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:3px;letter-spacing:-.3px}
.team-role{font-family:var(--mono);font-size:.62rem;color:var(--blue);letter-spacing:.8px;margin-bottom:9px;font-weight:500}
.team-bio{font-size:.8rem;color:var(--sub);line-height:1.7}

/* ── CONTACT ── */
.contact-wrap{max-width:680px;margin:0 auto;text-align:center}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:44px}
.cc{
  background:#fff;border:1.5px solid var(--border);border-radius:var(--r);
  padding:24px 18px;text-decoration:none;color:inherit;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  transition:all .3s;box-shadow:var(--shadow);cursor:pointer
}
.cc:hover{transform:translateY(-4px)}
.cc.ig:hover{border-color:#e1306c;box-shadow:0 12px 40px rgba(225,48,108,.12)}
.cc.wa:hover{border-color:#25d366;box-shadow:0 12px 40px rgba(37,211,102,.12)}
.cc.em:hover{border-color:var(--blue);box-shadow:var(--shadow-blue)}
.cc.wb:hover{border-color:var(--green);box-shadow:var(--shadow-green)}
.cc-icon-wrap{
  width:48px;height:48px;border-radius:13px;
  display:flex;align-items:center;justify-content:center
}
.cc-icon-wrap.ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.cc-icon-wrap.wa{background:#25d366}
.cc-icon-wrap.em{background:rgba(0,149,255,.1);border:1px solid rgba(0,149,255,.2)}
.cc-icon-wrap.wb{background:rgba(0,229,176,.08);border:1px solid rgba(0,229,176,.2)}
.cc-lbl{font-family:var(--mono);font-size:.6rem;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase}
.cc-val{font-size:.84rem;font-weight:600;color:var(--text);text-align:center;letter-spacing:-.2px}
.cc.ig .cc-val{color:#d62976}
.cc.wa .cc-val{color:#1aa34a}
.cc.em .cc-val{color:var(--blue);font-size:.76rem}
.cc.wb .cc-val{color:#00b890;font-size:.74rem;word-break:break-all}

/* ── MODALS ── */
.modal-bg{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background:rgba(15,20,35,.5);backdrop-filter:blur(16px)
}
.modal-box{
  background:#fff;border:1px solid var(--border);border-radius:20px;
  padding:40px 32px;max-width:440px;width:100%;
  box-shadow:0 40px 120px rgba(0,0,0,.18)
}
.mc-btn{background:none;border:none;color:var(--sub);font-size:1.2rem;cursor:pointer;float:right;line-height:1;transition:color .2s}
.mc-btn:hover{color:var(--text)}
.m-eye{font-family:var(--mono);font-size:.6rem;color:var(--blue);letter-spacing:2px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.m-eye::before{content:'';width:16px;height:1.5px;background:var(--blue)}
.m-title{font-size:1.5rem;font-weight:800;letter-spacing:-1px;color:var(--text);margin-bottom:5px}
.m-sub{color:var(--sub);font-size:.83rem;margin-bottom:22px;line-height:1.65}

/* PIN */
.pin-display{display:flex;gap:10px;justify-content:center;margin:22px 0}
.pin-dot{
  width:46px;height:56px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:1.5rem;color:var(--text);transition:all .25s
}
.pin-dot.filled{border-color:var(--blue);background:rgba(0,149,255,.06);color:var(--blue)}
.pin-dot.error{border-color:#ef4444;background:rgba(239,68,68,.06);animation:shake .4s}
.pin-dot.ok{border-color:var(--green);background:rgba(0,229,176,.08)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:16px}
.pin-key{
  background:var(--bg2);border:1.5px solid var(--border);border-radius:11px;
  padding:15px;font-family:var(--mono);font-size:1rem;
  color:var(--text);cursor:pointer;transition:all .2s;text-align:center;font-weight:600
}
.pin-key:hover{background:#fff;border-color:var(--blue);color:var(--blue);box-shadow:var(--shadow-blue)}
.pin-key.del{color:var(--sub);font-size:.78rem}
.pin-msg{text-align:center;font-family:var(--mono);font-size:.68rem;margin-top:12px;height:18px}
.pin-msg.err{color:#ef4444}
.pin-msg.ok{color:#00b890}
.pin-hint{text-align:center;font-family:var(--mono);font-size:.6rem;color:var(--sub);margin-top:14px;line-height:1.7}
.pin-hint span{color:var(--blue)}

/* EDIT FORM */
.ef label{display:block;font-family:var(--mono);font-size:.6rem;color:var(--sub);letter-spacing:1px;margin-bottom:5px;margin-top:14px}
.ef input,.ef textarea{
  width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;
  padding:10px 13px;color:var(--text);font-family:var(--font);font-size:.84rem;outline:none;transition:border .2s;resize:vertical
}
.ef input:focus,.ef textarea:focus{border-color:var(--blue);background:#fff}
.ef textarea{min-height:75px}
.f-actions{display:flex;gap:10px;margin-top:18px}

/* ADMIN BADGE */
.admin-badge{
  position:fixed;bottom:20px;right:20px;z-index:300;
  background:var(--grad);color:#fff;font-family:var(--mono);
  font-size:.62rem;font-weight:600;padding:8px 16px;border-radius:100px;
  letter-spacing:.8px;display:flex;align-items:center;gap:7px;cursor:pointer;
  box-shadow:var(--shadow-blue);animation:badgePop .4s cubic-bezier(.34,1.56,.64,1) both
}
.admin-badge:hover{filter:brightness(1.08);box-shadow:0 8px 32px rgba(0,149,255,.4)}
@keyframes badgePop{from{opacity:0;transform:scale(.6)translateY(20px)}to{opacity:1;transform:scale(1)translateY(0)}}

/* FOOTER */
footer{
  border-top:1px solid var(--border);padding:26px 5vw;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px
}
.fl{font-family:var(--mono);font-size:.66rem;color:var(--sub)}

const{useState,useEffect,useRef,useCallback}=React;

/* ── SECURITY ── */
const MASTER_PIN='2580'; // ← CAMBIA ESTE PIN

function useAdminShortcut(fn){
  useEffect(()=>{
    const keys=new Set();
    const kd=e=>{keys.add(e.key);if(keys.has('Control')&&keys.has('Shift')&&(keys.has('A')||keys.has('a')))fn();};
    const ku=e=>keys.delete(e.key);
    window.addEventListener('keydown',kd);window.addEventListener('keyup',ku);
    return()=>{window.removeEventListener('keydown',kd);window.removeEventListener('keyup',ku)};
  },[fn]);
}

function useReveal(){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('visible');obs.disconnect();}},{threshold:.1});
    obs.observe(el);return()=>obs.disconnect();
  },[]);
  return ref;
}

/* ════ PIN MODAL ════ */
function PinModal({onSuccess,onClose}){
  const[digits,setDigits]=useState([]);
  const[st,setSt]=useState('idle');

  const append=useCallback(d=>{
    if(st==='error'){setDigits([d]);setSt('idle');return;}
    if(digits.length>=4)return;
    const next=[...digits,d];setDigits(next);
    if(next.length===4){
      if(next.join('')===MASTER_PIN){setSt('ok');setTimeout(onSuccess,600);}
      else{setSt('error');setTimeout(()=>{setDigits([]);setSt('idle');},800);}
    }
  },[digits,st,onSuccess]);

  const del=useCallback(()=>{
    if(st==='error'){setDigits([]);setSt('idle');return;}
    setDigits(d=>d.slice(0,-1));
  },[st]);

  useEffect(()=>{
    const h=e=>{
      if(e.key>='0'&&e.key<='9')append(e.key);
      else if(e.key==='Backspace')del();
      else if(e.key==='Escape')onClose();
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[append,del,onClose]);

  const pad=['1','2','3','4','5','6','7','8','9','','0','⌫'];

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
        <button className="mc-btn" onClick={onClose}>×</button>
        <div style={{clear:'both',marginBottom:6}}/>
        <div className="m-eye">ACCESO RESTRINGIDO</div>
        <div className="m-title">Master PIN</div>
        <div className="m-sub">Solo el propietario puede editar este sitio.</div>
        <div className="pin-display">
          {[0,1,2,3].map(i=>(
            <div key={i} className={`pin-dot${digits.length>i?' filled':''}${st==='error'?' error':''}${st==='ok'?' ok':''}`}>
              {digits[i]?'●':''}
            </div>
          ))}
        </div>
        <div className="pin-pad">
          {pad.map((k,i)=>
            k===''?<div key={i}/>:
            <button key={i} className={`pin-key${k==='⌫'?' del':''}`} onClick={()=>k==='⌫'?del():append(k)}>{k}</button>
          )}
        </div>
        <div className={`pin-msg${st==='error'?' err':st==='ok'?' ok':''}`}>
          {st==='error'?'PIN incorrecto.':st==='ok'?'✓ Acceso concedido':''}
        </div>
        <div className="pin-hint">
          Atajo: <span>Ctrl+Shift+A</span> · Ruta: <span>#/admin</span>
        </div>
      </div>
    </div>
  );
}

/* ════ APP ════ */
function App(){
  const[contact,setContact]=useState(false);
  const[showPin,setShowPin]=useState(false);
  const[isAdmin,setIsAdmin]=useState(false);

  const openPin=useCallback(()=>{if(!isAdmin)setShowPin(true);},[isAdmin]);
  useAdminShortcut(openPin);

  useEffect(()=>{
    const check=()=>{if(window.location.hash==='#/admin'&&!isAdmin)setShowPin(true);};
    check();window.addEventListener('hashchange',check);return()=>window.removeEventListener('hashchange',check);
  },[isAdmin]);

  function onPinSuccess(){setIsAdmin(true);setShowPin(false);window.location.hash='';}

  return(
    <>
      <Nav onContact={()=>setContact(true)} isAdmin={isAdmin} onAdmin={openPin}/>
      <Hero onContact={()=>setContact(true)} isAdmin={isAdmin}/>
      <div className="divider"/>
      <Services/>
      <div className="divider"/>
      <Projects isAdmin={isAdmin}/>
      <div className="divider"/>
      <LoanProDetail/>
      <div className="divider"/>
      <Team/>
      <div className="divider"/>
      <ContactSection onContact={()=>setContact(true)}/>
      <div className="divider"/>
      <Footer onContact={()=>setContact(true)}/>

      {contact&&<ContactModal onClose={()=>setContact(false)}/>}
      {showPin&&<PinModal onSuccess={onPinSuccess} onClose={()=>setShowPin(false)}/>}
      {isAdmin&&(
        <div className="admin-badge" onClick={()=>setIsAdmin(false)} title="Haz clic para salir del modo admin">
          🔓 ADMIN activo · Salir
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
